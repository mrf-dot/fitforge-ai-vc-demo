<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitForge AI — Your Personal Workout Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6C5CE7;
      --primary-dark: #5A4BD1;
      --accent: #00D2D3;
      --bg: #0F0F1A;
      --card: #1A1A2E;
      --card-hover: #222240;
      --text: #E8E8F0;
      --text-muted: #8888AA;
      --success: #00B894;
      --border: #2D2D4A;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .hero {
      text-align: center;
      padding: 60px 24px 40px;
      background: linear-gradient(135deg, #6C5CE7 0%, #00D2D3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero h1 { font-size: 3rem; font-weight: 700; letter-spacing: -1px; }
    .hero p {
      font-size: 1.15rem;
      margin-top: 8px;
      -webkit-text-fill-color: var(--text-muted);
    }
    .container { max-width: 720px; margin: 0 auto; padding: 0 24px 60px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-top: 32px;
    }
