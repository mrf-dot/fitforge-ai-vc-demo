<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitForge AI — Your Personal Workout Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6C5CE7;
      --primary-dark: #5A4BD1;
      --accent: #00D2D3;
      --bg: #0F0F1A;
      --card: #1A1A2E;
      --card-hover: #222240;
      --text: #E8E8F0;
      --text-muted: #8888AA;
      --success: #00B894;
      --border: #2D2D4A;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .hero {
      text-align: center;
      padding: 60px 24px 40px;
      background: linear-gradient(135deg, #6C5CE7 0%, #00D2D3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero h1 { font-size: 3rem; font-weight: 700; letter-spacing: -1px; }
    .hero p {
      font-size: 1.15rem;
      margin-top: 8px;
      -webkit-text-fill-color: var(--text-muted);
    }
    .container { max-width: 720px; margin: 0 auto; padding: 0 24px 60px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-top: 32px;
    }
    label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    select, input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    select:focus, input:focus { outline: none; border-color: var(--primary); }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,92,231,0.35); }
    .btn:disabled { opacity: 0.6; cursor: wait; }

    /* Results */
    #results { margin-top: 32px; display: none; }
    #results.visible { display: block; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .result-header h2 { font-size: 1.4rem; }
    .badge { background: var(--success); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .section-label { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 8px; }
    .exercise-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s;
    }
    .exercise-card:hover { background: var(--card-hover); }
    .exercise-name { font-weight: 600; font-size: 1rem; }
    .exercise-meta { color: var(--text-muted); font-size: 0.85rem; }
    .exercise-details { text-align: right; }
    .exercise-details span { display: block; font-size: 0.85rem; color: var(--text-muted); }
    .exercise-details strong { color: var(--accent); }
    .notes { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; font-style: italic; }
    .tips { list-style: none; padding: 0; }
    .tips li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .tips li:last-child { border: none; }
    .tips li::before { content: "💡 "; }
    .phase { background: var(--bg); border-radius: 8px; padding: 12px 16px; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px; }
    .footer { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 0.8rem; }
    .footer a { color: var(--accent); text-decoration: none; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #fff3; border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="hero">
    <h1>FitForge AI</h1>
    <p>AI-powered workout plans, personalized in seconds</p>
  </div>

  <div class="container">
    <div class="card">
      <form id="workout-form">
        <label for="goals">Your Goal</label>
        <select id="goals">
          <option value="general fitness">General Fitness</option>
          <option value="weight loss">Weight Loss</option>
          <option value="muscle gain">Muscle Gain</option>
          <option value="endurance">Endurance</option>
          <option value="flexibility">Flexibility & Mobility</option>
          <option value="strength">Strength Training</option>
        </select>

        <label for="level">Fitness Level</label>
        <select id="level">
          <option value="beginner">Beginner</option>
          <option value="intermediate" selected>Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>

        <label for="equipment">Available Equipment</label>
        <input type="text" id="equipment" placeholder="e.g. dumbbells, resistance bands, pull-up bar" />

        <button type="submit" class="btn" id="submit-btn">Generate My Workout</button>
      </form>
    </div>

    <div id="results" class="card">
      <div class="result-header">
        <h2 id="plan-name"></h2>
        <span class="badge">AI Generated</span>
      </div>
      <p id="plan-desc" style="color:var(--text-muted); margin-bottom: 12px;"></p>

      <div class="section-label">Warm-Up</div>
      <div class="phase" id="warmup"></div>

      <div class="section-label">Exercises</div>
      <div id="exercises-list"></div>

      <div class="section-label">Cool-Down</div>
      <div class="phase" id="cooldown"></div>

      <div class="section-label">Pro Tips</div>
      <ul class="tips" id="tips-list"></ul>
    </div>
  </div>

  <div class="footer">
    Built with ❤️ by <a href="#">FitForge</a> · Powered by AI
  </div>

  <script>
    const form = document.getElementById('workout-form');
    const btn = document.getElementById('submit-btn');
    const results = document.getElementById('results');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Generating...';

      const payload = {
        goals: document.getElementById('goals').value,
        level: document.getElementById('level').value,
        equipment: document.getElementById('equipment').value || 'bodyweight only',
      };

      try {
        const resp = await fetch('/api/workout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();

        document.getElementById('plan-name').textContent = data.plan_name || 'Your Workout';
        document.getElementById('plan-desc').textContent = data.description || '';
        document.getElementById('warmup').textContent = data.warmup || '5 min light cardio';
        document.getElementById('cooldown').textContent = data.cooldown || '5 min stretching';

        const list = document.getElementById('exercises-list');
        list.innerHTML = '';
        (data.exercises || []).forEach((ex) => {
          const card = document.createElement('div');
          card.className = 'exercise-card';
          card.innerHTML = `
            <div>
              <div class="exercise-name">${ex.name}</div>
              ${ex.notes ? `<div class="notes">${ex.notes}</div>` : ''}
            </div>
            <div class="exercise-details">
              <span><strong>${ex.sets}</strong> sets</span>
              <span>${ex.reps} reps</span>
              ${ex.rest ? `<span>Rest: ${ex.rest}</span>` : ''}
            </div>
          `;
          list.appendChild(card);
        });

        const tipsList = document.getElementById('tips-list');
        tipsList.innerHTML = '';
        (data.tips || []).forEach((tip) => {
          const li = document.createElement('li');
          li.textContent = tip;
          tipsList.appendChild(li);
        });

        results.classList.add('visible');
        results.scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        alert('Failed to generate workout. Please try again.');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate My Workout';
      }
    });
  </script>
</body>
</html>
