<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitForge</title>
  <style>
    :root { --primary: #6C5CE7; --accent: #00D2D3; --bg: #0F0F1A; --card: #1A1A2E; --text: #E8E8F0; --muted: #8888AA; --border: #2D2D4A; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { text-align: center; padding: 48px 16px 24px; }
    header h1 { font-size: 3rem; font-weight: 700; }
    header p { color: var(--muted); margin-top: 6px; }

    .container { max-width: 720px; margin: 0 auto; padding: 0 16px 60px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-top: 24px; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-top: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    select, input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem; margin-top: 6px; }
    select:focus, input:focus { outline: none; border-color: var(--primary); }

    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; font-size: 1.05rem; font-weight: 600; cursor: pointer; margin-top: 16px; transition: transform .15s, box-shadow .15s; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,92,231,.3); }
    .btn:disabled { opacity: .55; cursor: wait; }

    /* Progress bar */
    .progress-wrap { display: none; margin-top: 16px; }
    .progress-wrap.visible { display: block; }
    .progress-info { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-bottom: 6px; }
    .progress-track { width: 100%; height: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 4px; transition: width .3s ease; }

    /* Results */
    #results { display: none; text-align: left; }
    #results.show { display: block; }
    .section-label { font-size: .8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-top: 18px; margin-bottom: 6px; }
    .exercise { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: .95rem; }
    .exercise:last-child { border: none; }
    .ex-name { font-weight: 600; }
    .ex-detail { color: var(--muted); font-size: .85rem; }
    .ex-notes { color: var(--muted); font-size: .8rem; font-style: italic; margin-top: 2px; }
    .tips { list-style: none; padding: 0; }
    .tips li { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: .9rem; }
    .tips li:last-child { border: none; }
    .tips li::before { content: "💡 "; }
    .phase { color: var(--muted); font-size: .9rem; padding: 8px 0; }

    .footer { text-align: center; color: #555; font-size: .75rem; padding: 32px 0; }
  </style>
</head>
<body>

  <header>
    <h1>FitForge</h1>
    <p>AI-powered workout plans, personalized in seconds</p>
  </header>

  <div class="container">
    <div class="card">
      <form id="form">
        <label for="goals">Goal</label>
        <select id="goals">
          <option value="general fitness">General Fitness</option>
          <option value="weight loss">Weight Loss</option>
          <option value="muscle gain">Muscle Gain</option>
          <option value="endurance">Endurance</option>
          <option value="flexibility">Flexibility</option>
          <option value="strength">Strength</option>
        </select>

        <label for="level">Fitness Level</label>
        <select id="level">
          <option value="beginner">Beginner</option>
          <option value="intermediate" selected>Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>

        <label for="equipment">Available Equipment</label>
        <input type="text" id="equipment" placeholder="e.g. dumbbells, resistance bands, none" />

        <button type="submit" class="btn" id="btn">Generate My Workout</button>
      </form>

      <!-- Progress bar -->
      <div id="progress" class="progress-wrap">
        <div class="progress-info">
          <span id="progress-msg">Generating your plan…</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div id="results" class="card">
      <h2 id="r-name" style="margin:0 0 4px"></h2>
      <p id="r-desc" style="color:var(--muted);margin:0 0 8px"></p>

      <div class="section-label">Warm-Up</div>
      <div id="r-warmup" class="phase"></div>

      <div class="section-label">Exercises</div>
      <div id="r-exercises"></div>

      <div class="section-label">Cool-Down</div>
      <div id="r-cooldown" class="phase"></div>

      <div class="section-label">Pro Tips</div>
      <ul id="r-tips" class="tips"></ul>
    </div>
  </div>

  <div class="footer">FitForge &middot; Built by Mitch Feigenbaum</div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const progressWrap = document.getElementById('progress');
    const progressFill = document.getElementById('progress-fill');
    const progressPct = document.getElementById('progress-pct');
    const progressMsg = document.getElementById('progress-msg');
    const results = document.getElementById('results');

    let progressTimer = null;

    function startProgress() {
      let pct = 0;
      progressWrap.classList.add('visible');
      progressFill.style.width = '0%';
      progressPct.textContent = '0%';
      progressMsg.textContent = 'Generating your plan…';

      progressTimer = setInterval(() => {
        if (pct < 90) {
          pct += Math.random() * 12 + 3;
          if (pct > 90) pct = 90;
          progressFill.style.width = Math.round(pct) + '%';
          progressPct.textContent = Math.round(pct) + '%';
        }
        if (pct > 30) progressMsg.textContent = 'Building exercises…';
        if (pct > 60) progressMsg.textContent = 'Finalizing plan…';
      }, 400);
    }

    function finishProgress() {
      clearInterval(progressTimer);
      progressFill.style.width = '100%';
      progressPct.textContent = '100%';
      progressMsg.textContent = 'Done!';
      setTimeout(() => { progressWrap.classList.remove('visible'); }, 800);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Generating…';
      results.classList.remove('show');
      startProgress();

      const payload = {
        goals: document.getElementById('goals').value,
        level: document.getElementById('level').value,
        equipment: document.getElementById('equipment').value || 'bodyweight only'
      };

      try {
        const resp = await fetch('/api/workout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await resp.json();
        finishProgress();

        document.getElementById('r-name').textContent = data.plan_name || 'Your Workout';
        document.getElementById('r-desc').textContent = data.description || '';
        document.getElementById('r-warmup').textContent = data.warmup || '';
        document.getElementById('r-cooldown').textContent = data.cooldown || '';

        const exList = document.getElementById('r-exercises');
        exList.innerHTML = '';
        (data.exercises || []).forEach(ex => {
          const div = document.createElement('div');
          div.className = 'exercise';
          div.innerHTML =
            '<div class="ex-name">' + ex.name + (ex.muscle_group ? ' <span class="ex-detail">(' + ex.muscle_group + ')</span>' : '') + '</div>' +
            '<div class="ex-detail">' + ex.sets + ' sets &times; ' + ex.reps + (ex.rest ? ' &middot; Rest: ' + ex.rest : '') + '</div>' +
            (ex.notes ? '<div class="ex-notes">' + ex.notes + '</div>' : '');
          exList.appendChild(div);
        });

        const tipsList = document.getElementById('r-tips');
        tipsList.innerHTML = '';
        (data.tips || []).forEach(t => {
          const li = document.createElement('li');
          li.textContent = t;
          tipsList.appendChild(li);
        });

        results.classList.add('show');
        results.scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        finishProgress();
        alert('Failed to generate workout. Try again.');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate My Workout';
      }
    });
  </script>
</body>
</html>
